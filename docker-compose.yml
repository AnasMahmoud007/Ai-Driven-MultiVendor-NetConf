version: '3.8'

services:
  flowise:
    image: flowiseai/flowise:3.0.12
    container_name: netconfig_flowise
    restart: always
    environment:
      - PORT=3000
      - CORS_ORIGINS=*
      - IFRAME_ORIGINS=*
    ports:
      - '3000:3000'
    volumes:
      - flowise_data:/root/.flowise

volumes:
  flowise_data:
